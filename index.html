<!doctype html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Favicons & Website Icons for Browsers and Search Engine Crawlers (Google/Bing) -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="48x48" href="/favicon.png" />
    <link rel="shortcut icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    
    <!-- Primary SEO Metadata -->
    <title>Unboxkart - Handpicked Top Vetted Amazon Deals & Affiliate Shopping Guide</title>
    <meta name="description" content="Discover handpicked daily deals, top-rated products, and curated shopping guides for Amazon items. Hand-vetted for reviews integrity, quality, and price drops on electronics, home, beauty, and fashion." />
    <meta name="keywords" content="Unboxkart, unboxkart.com, Amazon Affiliate, best Amazon deals, handpicked products, vetted reviews, electronics reviews, smart home deals, kitchen gadgets, fashion recommendations, shopping guides, discount codes" />
    <link rel="canonical" href="https://unboxkart.com/" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://unboxkart.com/" />
    <meta property="og:title" content="Unboxkart - Handpicked Top Vetted Amazon Deals & Affiliate Shopping Guide" />
    <meta property="og:description" content="Discover handpicked daily deals, top-rated products, and curated shopping guides for Amazon items. Hand-vetted for reviews integrity and true price drops." />
    <meta property="og:image" content="https://unboxkart.com/logo.svg" />

    <!-- Twitter Cards -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:domain" content="unboxkart.com" />
    <meta name="twitter:url" content="https://unboxkart.com/" />
    <meta name="twitter:title" content="Unboxkart - Handpicked Top Vetted Amazon Deals" />
    <meta name="twitter:description" content="Handpicked daily deals and expert buying guides for vetted Amazon products. Save up to 70% with verified quality reviews." />
    <meta name="twitter:image" content="https://unboxkart.com/logo.svg" />

    <!-- Schema.org JSON-LD Structured Data for Search Engines -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Unboxkart",
      "url": "https://unboxkart.com/",
      "description": "Find the best Amazon deals, top-rated products, and expert buying guides. We scour Amazon daily to bring you handpicked deals with verified savings.",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://unboxkart.com/?view=categories&q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Unboxkart",
      "url": "https://unboxkart.com/",
      "logo": "https://unboxkart.com/logo.svg",
      "email": "unboxkart123@gmail.com",
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "customer support",
        "email": "unboxkart123@gmail.com"
      }
    }
    </script>
    
    <!-- Google Fonts Imports -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  </head>
  <body class="bg-slate-50 dark:bg-slate-950 transition-colors duration-200">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
