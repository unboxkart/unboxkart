<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Definition for gradients and shadow effects -->
  <defs>
    <filter id="subtle-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#000000" flood-opacity="0.08" />
    </filter>
  </defs>

  <!-- Group with subtle shadow for polish -->
  <g filter="url(#subtle-shadow)">
    <!-- Exploding Sparkles & Stars -->
    <!-- Large Blue Star (Top Center) -->
    <path d="M 230 45 L 235 60 L 250 60 L 238 70 L 242 85 L 230 75 L 218 85 L 222 70 L 210 60 L 225 60 Z" fill="#0066cc" />
    
    <!-- Small Blue Star (Top Left) -->
    <path d="M 160 115 L 163 123 L 171 123 L 165 128 L 167 136 L 160 131 L 153 136 L 155 128 L 149 123 L 157 123 Z" fill="#0066cc" />
    
    <!-- Orange Diamond (Upper Left) -->
    <path d="M 185 85 L 195 95 L 185 105 L 175 95 Z" fill="#ff6600" />
    
    <!-- Blue Diamond (Upper Right) -->
    <path d="M 275 80 L 287 92 L 275 104 L 263 92 Z" fill="#0066cc" />
    
    <!-- Orange Star Sparkle (Far Right) -->
    <path d="M 315 100 L 318 108 L 326 108 L 320 113 L 322 121 L 315 116 L 308 121 L 310 113 L 304 108 L 312 108 Z" fill="#ff6600" />

    <!-- Exploding Curved Swooshes -->
    <!-- Swoosh 1 (Left) -->
    <path d="M 215 155 C 205 130, 210 100, 222 85" stroke="#ff6600" stroke-width="4.5" stroke-linecap="round" fill="none" />
    <!-- Swoosh 2 (Center) -->
    <path d="M 240 150 C 240 120, 255 100, 270 88" stroke="#ff6600" stroke-width="4.5" stroke-linecap="round" fill="none" />
    <!-- Swoosh 3 (Right) -->
    <path d="M 260 155 C 275 140, 290 120, 295 110" stroke="#0066cc" stroke-width="4.5" stroke-linecap="round" fill="none" />

    <!-- Shopping Cart Frame (Behind box) -->
    <!-- Handle & Main Diag Bar -->
    <path d="M 85 160 C 85 150, 100 150, 110 150 L 140 150 L 205 310" stroke="#0066cc" stroke-width="15" stroke-linecap="round" stroke-linejoin="round" fill="none" />
    <path d="M 110 150 L 130 150" stroke="#ff6600" stroke-width="15" stroke-linecap="round" fill="none" />

    <!-- Box Inside (Isometric cardboard box) -->
    <g transform="translate(15, 10)">
      <!-- Left Side of Box -->
      <path d="M 155 190 L 225 210 L 225 265 L 155 245 Z" fill="#e5b575" stroke="#004f9b" stroke-width="4" stroke-linejoin="round" />
      <!-- Left Side Label Lines -->
      <line x1="168" y1="230" x2="190" y2="236" stroke="#004f9b" stroke-width="3" stroke-linecap="round" />
      <line x1="168" y1="238" x2="182" y2="242" stroke="#004f9b" stroke-width="3" stroke-linecap="round" />

      <!-- Right Side of Box -->
      <path d="M 225 210 L 285 190 L 285 245 L 225 265 Z" fill="#d7a15c" stroke="#004f9b" stroke-width="4" stroke-linejoin="round" />
      <!-- Right Side Door/Hole Details -->
      <path d="M 248 232 L 260 228 L 260 238 L 248 242 Z" fill="#a47538" stroke="#004f9b" stroke-width="2" />

      <!-- Left Flap Open -->
      <path d="M 155 190 L 145 165 L 210 185 L 225 210 Z" fill="#f0ca95" stroke="#004f9b" stroke-width="4" stroke-linejoin="round" />
      
      <!-- Right Flap Open -->
      <path d="M 225 210 L 285 190 L 300 165 L 245 185 Z" fill="#e5b575" stroke="#004f9b" stroke-width="4" stroke-linejoin="round" />
      
      <!-- Back Flap Open -->
      <path d="M 155 190 L 180 170 L 250 170 L 285 190 Z" fill="#c69350" stroke="#004f9b" stroke-width="4" stroke-linejoin="round" />

      <!-- Inner Box Dark Depth shadow -->
      <path d="M 155 190 L 225 210 L 285 190 L 250 178 L 180 178 Z" fill="#6d491c" opacity="0.3" />
    </g>

    <!-- Shopping Cart Basket Outer Rails (In front of box) -->
    <!-- Basket Bottom and Front slope -->
    <path d="M 205 310 L 315 285 L 345 185 L 180 200" stroke="#0066cc" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" fill="none" />
    
    <!-- Inner basket grid lines -->
    <path d="M 240 300 L 215 200" stroke="#0066cc" stroke-width="6" stroke-linecap="round" fill="none" />
    <path d="M 280 290 L 255 195" stroke="#0066cc" stroke-width="6" stroke-linecap="round" fill="none" />
    <path d="M 310 240 L 195 250" stroke="#0066cc" stroke-width="6" stroke-linecap="round" fill="none" />

    <!-- Basket Front Loop Orange Highlight -->
    <path d="M 315 285 L 345 185" stroke="#ff6600" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.85" />

    <!-- Cart Wheels -->
    <!-- Back Wheel Bracket (Orange) -->
    <path d="M 195 310 L 205 345" stroke="#ff6600" stroke-width="10" stroke-linecap="round" fill="none" />
    <!-- Back Wheel -->
    <circle cx="205" cy="345" r="16" fill="#0066cc" stroke="#003d80" stroke-width="4" />
    <circle cx="205" cy="345" r="5" fill="#ffffff" />

    <!-- Front Wheel Bracket (Orange) -->
    <path d="M 295 290 L 290 325" stroke="#ff6600" stroke-width="10" stroke-linecap="round" fill="none" />
    <!-- Front Wheel -->
    <circle cx="290" cy="325" r="16" fill="#0066cc" stroke="#003d80" stroke-width="4" />
    <circle cx="290" cy="325" r="5" fill="#ffffff" />
    
    <!-- Speed Lines (Trailing to the left) -->
    <line x1="75" y1="210" x2="135" y2="210" stroke="#0066cc" stroke-width="5" stroke-linecap="round" />
    <line x1="90" y1="230" x2="145" y2="230" stroke="#ff6600" stroke-width="4" stroke-linecap="round" />
    <line x1="105" y1="250" x2="155" y2="250" stroke="#0066cc" stroke-width="5" stroke-linecap="round" />
  </g>
</svg>
